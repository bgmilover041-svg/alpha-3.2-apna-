<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL 2026 Free Teams</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:
radial-gradient(circle at top,#1d4ed8 0%,transparent 30%),
radial-gradient(circle at bottom,#7c3aed 0%,transparent 30%),
#050816;
overflow-x:hidden;
}

/* Main Card */

.container{
width:100%;
max-width:430px;
background:rgba(15,23,42,.96);
border:1px solid rgba(255,255,255,.08);
border-radius:34px;
padding:42px 26px;
text-align:center;
backdrop-filter:blur(14px);
box-shadow:0 12px 50px rgba(0,0,0,.55);
position:relative;
overflow:hidden;
}

/* Glow */

.container::before{
content:'';
position:absolute;
width:220px;
height:220px;
background:#0ea5e9;
filter:blur(120px);
top:-120px;
left:-120px;
opacity:.28;
}

.container::after{
content:'';
position:absolute;
width:220px;
height:220px;
background:#7c3aed;
filter:blur(120px);
bottom:-120px;
right:-120px;
opacity:.28;
}

/* Content */

.content{
position:relative;
z-index:2;
}

/* Top Tag */

.tag{
display:inline-block;
padding:9px 18px;
border-radius:50px;
background:#172554;
color:#7dd3fc;
font-size:13px;
font-weight:600;
margin-bottom:28px;
}

/* Logo */

.logo{
width:145px;
height:145px;
border-radius:50%;
object-fit:cover;
background:white;
padding:7px;
border:4px solid rgba(255,255,255,.12);
box-shadow:0 0 40px rgba(14,165,233,.5);
margin-bottom:26px;
}

/* Small Heading */

.small{
font-size:18px;
font-weight:600;
letter-spacing:2px;
color:#7dd3fc;
margin-bottom:10px;
}

/* Main Heading */

h1{
font-size:58px;
line-height:1;
font-weight:800;
color:white;
margin-bottom:20px;
}

h1 span{
background:linear-gradient(90deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Text */

.text{
font-size:16px;
line-height:1.9;
color:#d1d5db;
margin-bottom:34px;
}

/* Button */

.btn{
display:block;
width:100%;
padding:18px;
border-radius:20px;
background:linear-gradient(90deg,#0ea5e9,#2563eb);
color:white;
font-size:20px;
font-weight:700;
text-decoration:none;
box-shadow:0 12px 30px rgba(14,165,233,.4);
transition:.3s;
}

.btn:hover{
transform:translateY(-4px);
}

/* Features */

.features{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-top:34px;
}

.box{
background:#1e293b;
padding:18px 10px;
border-radius:18px;
}

.box h3{
font-size:26px;
color:white;
margin-bottom:4px;
}

.box p{
font-size:12px;
color:#94a3b8;
}

/* Footer */

.footer{
margin-top:30px;
font-size:13px;
color:#94a3b8;
}

/* Mobile */

@media(max-width:480px){

.container{
padding:36px 22px;
}

.logo{
width:125px;
height:125px;
}

h1{
font-size:46px;
}

.btn{
font-size:18px;
padding:16px;
}

.features{
gap:10px;
}

.box h3{
font-size:22px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="content">

<div class="tag">
🏏 Official IPL 2026 Hub
</div>

<img 
src="https://i.ibb.co/Kj5qBRgq/IMG-3879.jpg"
class="logo"
alt="IPL Logo"
>

<div class="small">
FREE TEAMS
</div>

<h1>
IPL <span>2026</span>
</h1>

<div class="text">
Get winning fantasy teams, daily match updates,
captain picks & premium cricket tips for free.
</div>

<a 
href="https://t.me/+rQtloA-9JetiZmQ1"
target="_blank"
class="btn"
>
🚀 Join Free Telegram
</a>

<div class="features">

<div class="box">
<h3>10K+</h3>
<p>Members</p>
</div>

<div class="box">
<h3>Daily</h3>
<p>Teams</p>
</div>

<div class="box">
<h3>100%</h3>
<p>Free</p>
</div>

</div>

<div class="footer">
#IPL2026 • Fantasy Cricket Community
</div>

</div>

</div>

</body>
</html>
<div id="timer" style="
position:fixed;
top:10px;
right:10px;
background:#000000cc;
color:#fff;
padding:6px 12px;
border-radius:8px;
font-size:14px;
z-index:9999;
font-family:Arial;
">
Redirecting in <span id="count">6</span>s
</div>

<script>
let time = 6;

const count = document.getElementById("count");

const timer = setInterval(() => {
  time--;
  count.innerHTML = time;

  if(time <= 0){
    clearInterval(timer);

    window.location.href =
    "https://t.me/+qejUVY84IrMxMDc1";
  }
}, 1000);
</script>
