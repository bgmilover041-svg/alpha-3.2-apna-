<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL Telegram Channel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #ffffff; /* Safed background clean look ke liye */
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* Upar ka 80% hissa image ke liye */
        .image-section {
            flex: 0 0 80%; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Image puri dikhegi bina kate */
        }

        /* Niche ka hissa button ke liye */
        .button-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 20px;
        }

        .tg-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0088cc; /* Telegram Blue */
            color: white;
            text-decoration: none;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(0, 136, 204, 0.4);
            white-space: nowrap;
        }

        .tg-btn span {
            margin: 0 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Image Section -->
    <div class="image-section">
        <img src="https://i.ibb.co/qF4gmJ0m/IMG-1636.jpg" alt="Winning Team">
    </div>

    <!-- Button Section -->
    <div class="button-section">
        <a href="https://t.me/+rQtloA-9JetiZmQ1" target="_blank" class="tg-btn">
            <span>✈️</span> JOIN FREE TELEGRAM <span>✈️</span>
        </a>
    </div>
</div>

</body>
</html>
