<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL FREE TEAM</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #000;
            overflow: hidden; /* Screen lock karne ke liye */
        }

        .landing-page {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        /* Top Yellow Banner */
        .yellow-bar {
            background: #ffd400;
            color: #000;
            text-align: center;
            padding: 12px 10px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 10;
        }

        /* Red Winning Banner */
        .red-bar {
            background: #e60000;
            color: #fff;
            text-align: center;
            padding: 15px 5px;
            font-size: 28px;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Main Image Content */
        .content-image {
            flex: 1;
            width: 100%;
            object-fit: contain; /* Photo poori dikhegi bina kate */
            background: #fff;
        }

        /* Telegram Button Area */
        .footer-action {
            position: absolute;
            bottom: 25px;
            left: 0;
            width: 100%;
            padding: 0 15px;
            z-index: 20;
        }

        /* New Attractive One-Line Button */
        .telegram-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0088cc 0%, #00a2ed 100%);
            color: white;
            text-decoration: none;
            padding: 18px 10px;
            border-radius: 50px;
            font-size: 22px; /* Font thoda adjust kiya taaki ek line mein aaye */
            font-weight: 900;
            white-space: nowrap; /* Text ko ek hi line mein rakhta hai */
            box-shadow: 0 10px 25px rgba(0, 136, 204, 0.5), inset 0 -4px 0 rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.2);
            transition: 0.3s;
            animation: pulse 1.5s infinite;
        }

        .telegram-btn span {
            margin: 0 10px;
            font-size: 26px;
        }

        /* Button Animation */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 25px rgba(0, 136, 204, 0.5); }
            50% { transform: scale(1.02); box-shadow: 0 15px 35px rgba(0, 136, 204, 0.7); }
            100% { transform: scale(1); box-shadow: 0 10px 25px rgba(0, 136, 204, 0.5); }
        }

        /* Mobile Optimization */
        @media (max-width: 380px) {
            .telegram-btn { font-size: 18px; padding: 15px 5px; }
            .red-bar { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="landing-page">
    <div class="yellow-bar">
        🔥 Daily Winning | First Rank | FREE TEAM 🔥
    </div>

    <div class="red-bar">
        मेरी टीम से 1st रैंक पक्का
    </div>

    <img src="https://i.ibb.co/qF4gmJ0m/IMG-1636.jpg" class="content-image" alt="Winning Proof">

    <div class="footer-action">
        <a href="https://t.me/+rQtloA-9JetiZmQ1" target="_blank" class="telegram-btn">
            <span>✈️</span> JOIN FREE TELEGRAM <span>✈️</span>
        </a>
    </div>
</div>

</body>
</html>
