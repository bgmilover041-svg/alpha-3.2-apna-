<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL FREE TEAM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #fff;
            overflow: hidden;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            padding: 10px 0;
        }

        /* Image Section - Screenshot jaisa exact look */
        .banner-container {
            flex: 0 0 75%; /* Image ko bada rakha hai */
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .banner-container img {
            width: 95%;
            height: 100%;
            object-fit: contain;
            border-radius: 5px;
        }

        /* Button Section */
        .cta-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 15px;
        }

        /* Red Button exactly like screenshot */
        .red-tg-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #cc0000; /* Dark Red */
            color: white;
            text-decoration: none;
            width: 100%;
            max-width: 500px;
            padding: 18px 10px;
            border-radius: 12px; /* Rounded corners like screenshot */
            font-size: 22px;
            font-weight: bold;
            border: 2px solid #004488; /* Blue border as seen in image */
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        .tg-icon {
            background: white;
            color: #cc0000;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <!-- Screenshot Image -->
    <div class="banner-container">
        <img src="https://i.ibb.co/qF4gmJ0m/IMG-1636.jpg" alt="Winning Proof">
    </div>

    <!-- Join Button -->
    <div class="cta-container">
        <a href="https://t.me/+rQtloA-9JetiZmQ1" target="_blank" class="red-tg-button">
            <div class="tg-icon">✈</div>
            JOIN FREE TELEGRAM
        </a>
    </div>
</div>

</body>
</html>
