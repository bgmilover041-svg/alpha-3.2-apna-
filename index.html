<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Join</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #0b0f1a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        max-width: 500px;
        width: 100%;
        padding: 20px;
        text-align: center;
    }

    .hero-img {
        width: 100%;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(0,0,0,0.7);
        cursor: pointer;
    }

    .btn {
        display: inline-block;
        margin-top: 25px;
        padding: 22px 50px;
        background: linear-gradient(45deg, #00ffcc, #00aaff);
        color: black;
        font-weight: bold;
        text-decoration: none;
        border-radius: 16px;
        font-size: 20px;

        box-shadow: 0 0 15px #00ffcc, 0 0 35px #00aaff;
        animation: floatGlow 2s infinite ease-in-out;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.1);
    }

    @keyframes floatGlow {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
    }

</style>
</head>

<body>

<div class="container">

    <!-- CLICKABLE IMAGE -->
    <a href="https://t.me/+9r75i4Px6JYwYTg9" target="_blank">
        <img class="hero-img" src="https://i.ibb.co/qF4gmJ0m/IMG-1636.jpg" alt="Banner">
    </a>

    <!-- BUTTON -->
    <a class="btn" href="https://t.me/+eoTj1kirvwU3YzJl" target="_blank">
        Join Free Telegram
    </a>

</div>

</body>
</html>
