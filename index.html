<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPL FREE TEAM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #fff;
            overflow: hidden; /* Scroll rokne ke liye */
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            align-items: center;
        }

        /* Image section - isko thoda adjust kiya hai space kam karne ke liye */
        .image-box {
            flex: 0 0 72%; 
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Image niche ki taraf rahegi */
            padding-top: 10px;
        }

        .image-box img {
            max-width: 95%;
            height: 100%;
            object-fit: contain;
        }

        /* Button section - image ke ekdum paas */
        .button-box {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Button ko upar (image ke paas) lane ke liye */
            padding-top: 15px; /* Image aur button ke beech ka gap */
        }

        /* Exact Red Button like image_3.png */
        .btn-telegram {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #cc0000; /* Red color */
            color: white;
            text-decoration: none;
            width: 92%;
            max-width: 450px;
            padding: 16px;
            border-radius: 15px;
            font-size: 22px;
            font-weight: 900;
            border: 2px solid #004d99; /* Blue border as per screenshot */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        /* SVG Telegram Logo */
        .tg-logo {
            width: 32px;
            height: 32px;
            margin-right: 12px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .tg-logo svg {
            fill: #cc0000; /* Logo color match with button */
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="main-container">
    <!-- Image Area -->
    <div class="image-box">
        <img src="https://i.ibb.co/qF4gmJ0m/IMG-1636.jpg" alt="Winning Team">
    </div>

    <!-- Telegram Button Area -->
    <div class="button-box">
        <a href="https://t.me/+rQtloA-9JetiZmQ1" target="_blank" class="btn-telegram">
            <div class="tg-logo">
                <svg viewBox="0 0 24 24"><path d="M12 0c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm5.891 8.146l-2.003 9.464c-.149.659-.541.823-1.091.511l-3.051-2.249-1.472 1.417c-.163.163-.299.299-.614.299l.218-3.111 5.656-5.109c.246-.219-.054-.341-.381-.123l-6.991 4.402-3.016-.944c-.655-.204-.668-.655.137-.969l11.785-4.54c.545-.198 1.022.128.832.941z"/></svg>
            </div>
            JOIN FREE TELEGRAM
        </a>
    </div>
</div>

</body>
</html>
